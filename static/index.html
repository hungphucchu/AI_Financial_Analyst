<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Analyst</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --admin: #f59e0b;
      --intern: #22c55e;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .role-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-admin { background: rgba(245,158,11,0.15); color: var(--admin); }
    .role-intern { background: rgba(34,197,94,0.15); color: var(--intern); }

    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 360px;
    }

    .login-card h2 { margin-bottom: 24px; font-size: 20px; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-text {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 16px;
      text-align: center;
    }

    #chat-screen { flex: 1; display: none; flex-direction: column; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg-user {
      background: var(--accent);
      color: white;
      align-self: flex-end;
      margin-left: auto;
      max-width: 480px;
    }

    .msg-bot {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .msg-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .msg-status {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 8px;
    }

    .input-bar {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .input-row {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .input-row input:focus { border-color: var(--accent); }

    .send-btn {
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-card">
      <h2>Financial Analyst</h2>
      <div class="form-group">
        <label>Username</label>
        <input id="username" type="text" placeholder="admin or intern" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Password" />
      </div>
      <button class="btn" id="login-btn" onclick="login()">Sign In</button>
      <div class="error-text" id="login-error"></div>
      <div class="hint">Demo: admin / admin123 or intern / intern123</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-screen">
    <header>
      <h1>Financial Analyst</h1>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="role-badge" class="role-badge"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <div class="input-row">
        <input id="query-input" type="text" placeholder="Ask about financial data..."
               onkeydown="if(event.key==='Enter')sendQuery()" />
        <button class="send-btn" id="send-btn" onclick="sendQuery()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let token = null;
    let role = null;
    const API = window.location.origin;

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          const data = await res.json();
          errEl.textContent = data.detail || 'Login failed';
          errEl.style.display = 'block';
          return;
        }
        const data = await res.json();
        token = data.access_token;
        role = data.role;

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';

        const badge = document.getElementById('role-badge');
        badge.textContent = role;
        badge.className = `role-badge role-${role}`;

        addMessage(`Signed in as ${role}. Ask me anything about financial data.`, 'bot');
      } catch (e) {
        errEl.textContent = 'Connection failed';
        errEl.style.display = 'block';
      }
    }

    function logout() {
      token = null;
      role = null;
      document.getElementById('chat-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('messages').innerHTML = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    async function sendQuery() {
      const input = document.getElementById('query-input');
      const question = input.value.trim();
      if (!question) return;

      input.value = '';
      addMessage(question, 'user');

      const statusEl = addMessage('Thinking...', 'status');
      document.getElementById('send-btn').disabled = true;

      try {
        const res = await fetch(`${API}/query/stream`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) {
          statusEl.remove();
          const text = await res.text();
          let data;
          try { data = JSON.parse(text); } catch { data = null; }
          const detail = data ? (data.detail || JSON.stringify(data)) : `HTTP ${res.status}: ${text.substring(0, 200)}`;
          addMessage(detail, 'error');
        } else {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let answerEl = null;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
              if (line.startsWith('event: status')) {
                const dataLine = lines[lines.indexOf(line) + 1];
                if (dataLine && dataLine.startsWith('data: ')) {
                  statusEl.textContent = dataLine.substring(6);
                }
              } else if (line.startsWith('data: ') && !line.startsWith('data: Planning') && !line.startsWith('data: Complete')) {
                const content = line.substring(6);
                if (content && content.length > 5) {
                  statusEl.remove();
                  if (!answerEl) answerEl = addMessage(content, 'bot');
                  else answerEl.textContent = content;
                }
              }
            }
          }

          if (!answerEl) {
            statusEl.remove();
            addMessage('No response received.', 'error');
          }
        }
      } catch (e) {
        statusEl.remove();
        addMessage(`Network error: ${e.message}`, 'error');
      }

      document.getElementById('send-btn').disabled = false;
      document.getElementById('query-input').focus();
    }

    function addMessage(text, type) {
      const el = document.createElement('div');
      el.className = `message msg-${type}`;
      el.textContent = text;
      const container = document.getElementById('messages');
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
      return el;
    }
  </script>
</body>
</html>
